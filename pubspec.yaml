name: taskflow_mobile
description: "タスク管理アプリ"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── 状態管理 ──────────────────────────────────────────────
  hooks_riverpod: ^3.3.2
  flutter_hooks:
  riverpod_annotation: ^4.0.3

  # ── モデル・JSON ──────────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── ルーティング ──────────────────────────────────────────
  go_router: ^15.1.2

  # ── HTTP通信 ──────────────────────────────────────────────
  dio: ^5.9.2

  # ── セキュアストレージ ────────────────────────────────────
  flutter_secure_storage: ^10.0.0

  # ── ローカルDB ────────────────────────────────────────────
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # ── 通知 ─────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── テーマ ────────────────────────────────────────────────
  flex_color_scheme: ^8.2.0

  # ── 日付・時刻 ────────────────────────────────────────────
  intl: ^0.20.2

  # ── ネットワーク状態 ──────────────────────────────────────
  connectivity_plus: ^6.1.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── コード生成 ────────────────────────────────────────────
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.4
  freezed: ^3.2.5
  json_serializable: ^6.9.4

  # ── Lint ──────────────────────────────────────────────────
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.4

  # ── テスト ────────────────────────────────────────────────
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
