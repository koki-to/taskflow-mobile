include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # freezedとjson_serializableを組み合わせるときに
    # 出る警告を抑制する（freezed公式推奨の設定）
    invalid_annotation_target: ignore

    # riverpod_generatorの自動生成ファイルで出る警告を抑制する
    # → $FunctionalProvider などの @internal メンバーへの
    #   アクセス警告を無視する
    # → 自分のコードではなく生成コードが参照しているだけなので安全
    invalid_use_of_internal_member: ignore

linter:
  rules:
    # buildメソッド内のWidgetにconstをつけ忘れたときに警告
    prefer_const_constructors: true
    # print()の使用を禁止（本番コードにprint()を残さない）
    avoid_print: true
    # 不要なthisを禁止(this.name -> name)
    unnecessary_this: true
